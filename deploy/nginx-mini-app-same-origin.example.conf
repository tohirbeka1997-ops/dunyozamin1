# Bir subdomen: Mini App (SPA) + /v1 → public-api (bir xil origin — CORS muammosiz).
# SSL: certbot --nginx -d app.example.com
#
# Joylash: /etc/nginx/sites-available/app-mini (symlink sites-enabled)
# root: mini-app build: `cd mini-app && npm run build` → dist/ ni shu yo‘lga nusxalang yoki root ni loyiha ichiga ko‘rsating.
#
# Tekshirish: curl -sS https://app.example.com/health  (agar health ni public-api ga ham proxylasangiz)
# Yoki: curl http://127.0.0.1:3334/health

server {
    listen 80;
    server_name app.example.com;

    # SSL dan keyin certbot qo‘shadi — yoki qo‘lda ssl_certificate qatorlari

    root /home/pos/app/mini-app/dist;
    index index.html;

    client_max_body_size 2m;

    # Public API (JWT, katalog, buyurtma)
    location /v1/ {
        proxy_pass http://127.0.0.1:3334;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Health (ixtiyoriy — monitoring)
    location = /health {
        proxy_pass http://127.0.0.1:3334/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:js|css|woff2?|ttf|png|jpg|jpeg|webp|svg|ico)$ {
        expires 7d;
        access_log off;
        try_files $uri =404;
    }
}
