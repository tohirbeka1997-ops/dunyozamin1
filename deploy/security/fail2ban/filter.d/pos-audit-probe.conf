# =============================================================================
# fail2ban filter — optional privilege-probing detector (Bosqich 19)
# =============================================================================
# Matches auth.denied from audit.log. A cashier clicking the wrong button
# occasionally is normal; enable this jail ONLY with a high maxretry (e.g. 40+
# in 10 minutes) to catch automated channel scanning without punishing humans.
#
# Default: jail disabled — see pos-audit.local
#
# No datepattern — same rationale as pos-audit.conf (MIGRATION 7.18).
# =============================================================================

[INCLUDES]
before = common.conf

[Definition]
_daemon = pos-audit-probe

failregex = ^\{"t":"[^"]+","type":"auth\.denied".*?"ip":"<HOST>"

ignoreregex =

journalmatch =
