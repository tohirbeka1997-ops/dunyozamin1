# =============================================================================
# fail2ban filter — POS audit.log (JSONL, Bosqich 19)
# =============================================================================
# Matches lines written by electron/net/auditLog.cjs to:
#   /var/lib/pos/logs/audit.log   (or POS_AUDIT_LOG_PATH)
#
# Events that count toward a ban:
#   * auth.login.failure     — wrong password / unknown user
#   * rate_limit.blocked     — only when kind=="login" (credential stuffing)
#
# We deliberately do NOT match:
#   * rate_limit.blocked kind=rpc — many legit terminals behind one NAT share
#     an external IP; banning on global RPC throttle would lock out stores.
#   * auth.denied — cashiers hit this during normal UI flows; use a separate
#     optional jail with a very high maxretry if you enable it.
#
# Install: see deploy/scripts/install-fail2ban-pos.sh
# =============================================================================

[INCLUDES]
before = common.conf

[Definition]
_daemon = pos-audit

# No datepattern — MIGRATION 7.18: Node ISO milliseconds + fail2ban strptime
# differ across distros; tailed lines are processed within ms of the event.

# Order of JSON keys follows Node insertion order from auditLog.cjs — but we
# use non-greedy wildcards so key order can drift without breaking the filter.
failregex = ^\{"t":"[^"]+","type":"auth\.login\.failure".*?"ip":"<HOST>"
            ^\{"t":"[^"]+","type":"rate_limit\.blocked".*?"kind":"login".*?"ip":"<HOST>"
            ^\{"t":"[^"]+","type":"rate_limit\.blocked".*?"ip":"<HOST>".*?"kind":"login"

ignoreregex =

journalmatch =
