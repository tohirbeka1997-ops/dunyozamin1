# =============================================================================
# app.dunyozamin.com + api.dunyozamin.com — POS RPC (3333) + Mini App SPA + public-api (3334)
#
# O‘rnatish (serverda zaxira oling):
#   cp /etc/nginx/sites-enabled/pos.conf /root/pos.conf.bak
#   nano /etc/nginx/sites-enabled/pos.conf
#
# O‘zgartirishlar (shu fayldagi bilan solishtiring):
#   1) upstream public_api qo‘shilgan
#   2) root → /opt/pos/mini-app/dist
#   3) location /v1/ → 127.0.0.1:3334
#   4) location = /health → public-api (3334), POS /health uchun: curl http://127.0.0.1:3333/health
#   5) Telegram Mini App: X-Frame-Options olib tashlangan, CSP frame-ancestors ga web.telegram.org
#
# Keyin: nginx -t && systemctl reload nginx
# =============================================================================

upstream pos_backend {
    server 127.0.0.1:3333;
    keepalive 32;
}

upstream public_api {
    server 127.0.0.1:3334;
    keepalive 16;
}

# ... (limit_req_zone, log_format — mavjud pos.conf dan o‘zgartirmasdan qoldiring) ...

