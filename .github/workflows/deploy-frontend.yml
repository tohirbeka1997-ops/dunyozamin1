name: Deploy frontend

# Builds the Vite bundle on the GitHub runner and rsyncs it to the Hetzner
# host with atomic symlink swap. VITE_* env vars are injected from repo
# "Variables" (public, cached by the browser) — never from secrets.

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'vite.config.*'
      - 'tsconfig*.json'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

concurrency:
  group: deploy-frontend-main
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-publish:
    name: Build + rsync
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://${{ vars.POS_DOMAIN }}
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
      npm_config_ignore_scripts: 'true'
      # Public build-time config. Use repository Variables (not Secrets)
      # because Vite inlines them into the bundle.
      VITE_POS_RPC_URL:        ${{ vars.VITE_POS_RPC_URL }}
      VITE_PRINT_AGENT_URL:    ${{ vars.VITE_PRINT_AGENT_URL }}
      VITE_PRINT_AGENT_SECRET: ${{ vars.VITE_PRINT_AGENT_SECRET }}
      # VITE_POS_RPC_SECRET is intentionally OMITTED in the hosted build:
      # end users authenticate via login; only the bootstrap/admin should
      # carry the shared secret, and we keep that out of the public bundle.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build

      - name: Sanity-check dist/
        run: |
          set -e
          test -f dist/index.html
          test -d dist/assets
          BYTES=$(du -sb dist | cut -f1)
          echo "dist size: $BYTES bytes"
          if [ "$BYTES" -lt 100000 ]; then
            echo "❌ dist is suspiciously small — aborting publish."; exit 1
          fi

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Known hosts (avoid MITM warning)
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.DEPLOY_PORT || 22 }} \
            -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: rsync dist/ to staging dir
        run: |
          set -e
          STAMP=$(date +%Y%m%d-%H%M%S)-${GITHUB_SHA::7}
          echo "STAMP=$STAMP" >> $GITHUB_ENV
          rsync -az --delete \
            -e "ssh -p ${{ secrets.DEPLOY_PORT || 22 }}" \
            dist/ \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/var/www/pos/releases/$STAMP/

      - name: Atomic symlink swap + keep last 5 releases
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -euo pipefail
            STAMP="${{ env.STAMP }}"
            cd /var/www/pos

            # Point `current` at the new release atomically.
            ln -sfn "releases/$STAMP" current-tmp
            mv -Tf current-tmp current

            # Reload nginx to flush any cached fds.
            sudo -n systemctl reload nginx || true

            # Keep the 5 most recent releases, prune the rest.
            cd releases
            ls -1t | tail -n +6 | xargs -r rm -rf

      - name: Verify public HTML
        if: vars.POS_DOMAIN != ''
        run: |
          set -e
          URL="https://${{ vars.POS_DOMAIN }}/"
          CODE=$(curl -s -o /dev/null -w "%{http_code}" "$URL" || echo 000)
          echo "$URL -> $CODE"
          test "$CODE" = "200"
